<!DOCTYPE html>
<html>
<head>
    <title>View All Images</title>
    <style>
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            padding: 20px;
        }
        .card {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: center;
        }
        img {
            max-width: 100%;
            height: 200px;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <div class="grid" id="grid"></div>
    <script>
        const images = [
            "bc7a184d6833121b171949a4a57d5ab9 (1) 1.png",
            "image 14.png",
            "image 15.jpg",
            "image 16.png",
            "image 17.png",
            "image 18.jpg",
            "image 19.png",
            "image 20.png",
            "image 21.png",
            "image 22.png",
            "image 23.png",
            "image 24.png",
            "image 25.png",
            "image 26.png",
            "image 27.png",
            "image 28.png",
            "image 29.png",
            "image 30.png",
            "image 31.png",
            "image 32.jpg",
            "image 33.png",
            "image 34.png",
            "image 35.png",
            "image 37.png",
            "laptop-cover-mockup (1) 1.png",
            "laptop-cover-mockup 1.jpg",
            "mockup_11 1.png",
            "mockup_18 1.jpg",
            "side-angle-baseball-cap-mockup-in-white-studio-0026 1.png",
            "young-model-wearing-basecall-cap-mockup-in-street-during-the-day-0027 1.png"
        ];
        const grid = document.getElementById('grid');
        images.forEach(img => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <h3>${img}</h3>
                <img src="assets/products/${img}" alt="${img}">
            `;
            grid.appendChild(card);
        });
    </script>
</body>
</html>
